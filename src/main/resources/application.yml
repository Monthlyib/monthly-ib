server:
  port: 8987
spring:
  servlet:
    multipart:
      max-file-size: 300MB
      max-request-size: 300MB
  datasource:
    url: ${MAIN_DB_URL}
    username: ${MAIN_DB_ID}
    password: ${MAIN_DB_PW}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 24
      connection-timeout: 30000
      validation-timeout: 2000
      idle-timeout: 60000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    #    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000
  sql:
    init:
      mode: never
  cache:
    type: redis
  data:
    redis:
      host: ${AWS_ELASTICACHE_END_POINT}
      port: 16379
logging.level:
  org.hibernate.SQL: warn
  org.hibernate.orm.jdbc.bind: warn
  org.springframework.web.servlet: info
mail:
  smtp:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    auth: true
    starttls:
      enable: true
  subject:
    user:
      registration: Thank you for joining our service!
      verification: Please complete verification. Thank you!
      password-reset: Monthly IB Temporary Password
  template:
    name:
      user:
        join: email-registration-member
        password-reset: email-registration-member
cloud:
  aws:
    s3:
      bucket: monthlyib
      dir: /monthlyib-file
    region:
      static: ap-northeast-2
    stack:
      auto: false
springdoc:
  swagger-ui:
    path: /docs
    groups-order: DESC
    operationsSorter: method
    disable-swagger-default-url: true
    display-request-duration: true
    tags-sorter: alpha
  api-docs:
    path: /api-docs
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  paths-to-match:
    - /api/**
    - /open-api/**
  show-login-endpoint: false

oauth:
  naver:
    url:
      auth: https://nid.naver.com
      api: https://openapi.naver.com
    secret: ${NAVER_SECRET_KEY}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:}
    calendar:
      client-id: ${GOOGLE_CALENDAR_CLIENT_ID:${GOOGLE_CLIENT_ID:}}
      client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET:}}
      refresh-token: ${GOOGLE_CALENDAR_REFRESH_TOKEN:}
      calendar-id: ${GOOGLE_CALENDAR_ID:primary}
    url:
      auth: https://oauth2.googleapis.com
      api: https://openidconnect.googleapis.com
      calendar-api: https://www.googleapis.com/calendar/v3

finance:
  aws:
    access-key-id: ${AWS_BILLING_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_BILLING_SECRET_ACCESS_KEY:}
    region: ${AWS_BILLING_REGION:us-east-1}
  openai:
    api-key: ${OPENAI_COSTS_API_KEY:${OPENAI_API_KEY:}}
    organization-id: ${OPENAI_ORGANIZATION_ID:}
    base-url: https://api.openai.com/v1
  exchange:
    base-url: https://api.frankfurter.app
    fallback-usd-krw-rate: ${FINANCE_EXCHANGE_FALLBACK_USD_KRW_RATE:1400}
