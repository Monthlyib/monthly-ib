name: Push Local Env To EC2

on:
  workflow_dispatch:

jobs:
  push-env:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Push env.yml and redeploy
        env:
          TEMP_ENV_YML_B64: ${{ secrets.TEMP_ENV_YML_B64 }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 1800 \
            --parameters 'commands=[
              "set -e",
              "sudo -u ubuntu mkdir -p /home/ubuntu/monthly-ib/src/main/resources",
              "sudo -u ubuntu bash -lc \"printf %s '\'''"$TEMP_ENV_YML_B64"''\'' | base64 -d > /home/ubuntu/monthly-ib/src/main/resources/env.yml\"",
              "sudo chown ubuntu:ubuntu /home/ubuntu/monthly-ib/src/main/resources/env.yml",
              "sudo -u ubuntu bash -lc \"cd /home/ubuntu/monthly-ib && chmod +x deploy.sh && bash deploy.sh\""
            ]' \
            --region ap-northeast-2 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --region ap-northeast-2 \
              --query "Status" \
              --output text)

            echo "[$i/60] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Env push succeeded."
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-northeast-2 \
                --query "[StandardOutputContent,StandardErrorContent]" \
                --output text
              echo "Env push failed with status: $STATUS"
              exit 1
            fi

            sleep 30
          done

          echo "Timed out waiting for env push command."
          exit 1
