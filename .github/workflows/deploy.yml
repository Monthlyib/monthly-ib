name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 1800 \
            --parameters 'commands=["chown -R ubuntu:ubuntu /home/ubuntu/monthly-ib && sudo -u ubuntu bash -c \"cd /home/ubuntu/monthly-ib && git fetch --all && git reset --hard origin/main && chmod +x deploy.sh && bash deploy.sh\""]' \
            --region ap-northeast-2 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # 최대 30분 대기 (30초 간격으로 60회)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --region ap-northeast-2 \
              --query "Status" --output text)
            echo "[$i/60] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded."
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --region ap-northeast-2 \
                --query "[StandardOutputContent,StandardErrorContent]" \
                --output text
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done
